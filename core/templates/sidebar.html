{{define "sidebar"}}
<div class="sidebar">
    
    <div class="sidebar-header">
    <img src="/static/logo/ZT-logo.svg" class="logo-small">
     </div>


    <ul>
        {{range .Menus}}
            <li>
                <a href="{{.Path}}">
                    <img src="/static/icons/{{.Icon}}.svg" class="icon">
                    <span>{{.Name}}</span>
                </a>
            </li>
        {{end}}
    </ul>
</div>
{{end}}
