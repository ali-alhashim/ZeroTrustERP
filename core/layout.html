<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Trust ERP</title>
    <link rel="stylesheet" href="./static/style.css">
</head>
<body>
    <!-- Dynamic Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Zero Trust ERP</h2>
        </div>
        <div id="dynamicMenu"></div>
    </div>

    <!-- Main Content Area -->
    <div class="main-container">
        <div class="header">
            <h1 id="pageTitle">Dashboard</h1>
        </div>

        <!-- Workspace -->
        <div class="workspace">
            <div class="content-placeholder" id="pageContent">
                <div class="loading">Select a menu item to load content...</div>
            </div>
        </div>
    </div>

    <script>
        // Registered apps with their menu items
        const registeredApps = [
            {
                name: 'Dashboard',
                menuItems: [
                    { id: 'overview', label: 'Overview', page: 'dashboard/overview' },
                    { id: 'analytics', label: 'Analytics', page: 'dashboard/analytics' }
                ]
            },
            {
                name: 'Sales',
                menuItems: [
                    { id: 'orders', label: 'Orders', page: 'sales/orders' },
                    { id: 'customers', label: 'Customers', page: 'sales/customers' },
                    { id: 'quotes', label: 'Quotes', page: 'sales/quotes' }
                ]
            },
            {
                name: 'Inventory',
                menuItems: [
                    { id: 'products', label: 'Products', page: 'inventory/products' },
                    { id: 'stock', label: 'Stock', page: 'inventory/stock' },
                    { id: 'warehouses', label: 'Warehouses', page: 'inventory/warehouses' }
                ]
            }
        ];

        function renderMenu() {
            const menuContainer = document.getElementById('dynamicMenu');
            menuContainer.innerHTML = '';

            registeredApps.forEach(app => {
                const appMenu = document.createElement('div');
                appMenu.className = 'app-menu';

                const appTitle = document.createElement('div');
                appTitle.className = 'app-title';
                appTitle.textContent = app.name;
                appMenu.appendChild(appTitle);

                app.menuItems.forEach(item => {
                    const menuItem = document.createElement('div');
                    menuItem.className = 'menu-item';
                    menuItem.textContent = item.label;
                    menuItem.addEventListener('click', () => loadPage(item, menuItem));
                    appMenu.appendChild(menuItem);
                });

                menuContainer.appendChild(appMenu);
            });
        }

        function loadPage(item, element) {
            // Remove active class from all menu items
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            
            // Add active class to clicked item
            element.classList.add('active');

            // Update header
            document.getElementById('pageTitle').textContent = item.label;

            // Load page content
            const contentDiv = document.getElementById('pageContent');
            contentDiv.innerHTML = `<div class="loading">Loading ${item.label}...</div>`;

            // Simulate loading delay
            setTimeout(() => {
                contentDiv.innerHTML = `<h2>${item.label}</h2><p>Content for ${item.page} would be loaded here.</p>`;
            }, 300);
        }

        // Initialize menu on page load
        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
