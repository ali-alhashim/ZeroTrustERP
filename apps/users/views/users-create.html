{{define "content"}}

<h4>Create User</h4>

<form method="post" action="/users/create">
<table>

     <tr>
        <td>
          Email
        </td>
        <td>
          <input type="email" name="Email" id="Email" value="" placeholder="Enter Email" class="w-100"/>
        </td>
    </tr>

    <tr>
        <td>
          Username
        </td>
        <td>
          <input type="text" name="Username" id="Username" value="" placeholder="Enter Username" class="w-100"/>
        </td>
    </tr>



    <tr>
        <td>
          Active
        </td>
        <td>
          <input type="checkbox" name="Active" id="Active" checked class="w-100"/>
        </td>
    </tr>
    



    <tr>
        <td>
          Related Employee
        </td>
        <td>


          <select name="RelatedEmployee" id="RelatedEmployee" checked class="w-100" class="select-search">
            <option value="">Select Employee</option>
            {{range .Employees}}
              <option value="{{.ID}}">{{.FirstName}} {{.LastName}}</option>
            {{end}}
          </select>


        </td>
    </tr>



    
</table>


<table class="xy-5">
    <thead>
        <tr>
            <th colspan="3">Assign Roles</th>
        </tr>
    </thead>
    <tbody id="Roles-Table-Body">
    <tr>
        <td>
            1
        </td>
     <td>
               <select name="Role" id="Role" class="w-100 select-search">
                <option value="">Select Role</option>
                </select>

             
     </td>
     <td>
       -
     </td>
    </tr>
    </tbody>

    <tr>
      <td colspan="2">
         <button type="button" class="btn btn-primery" onclick="addExtraRole()">
           <img src="/static/icons/plus.svg" alt="Add New User +"  class="icon" width="20"/>
         </button>
      </td>
      <td>

      </td>
    </tr>
</table>
<input type="hidden" name="rolesCountInput" id="rolesCountInput" value="0"/>

<button type="submit" class="btn btn-primary m-5">Create User</button>

</form>

<script>
  // 1. Global variable to store roles once fetched
  let globalRoles = [];

  // 2. Main initialization on page load
  document.addEventListener('DOMContentLoaded', function() {
    fetchRoles();
  });

  function fetchRoles() {
    fetch('/api/fetch-roles', {
      method: 'GET',
      credentials: 'include'
    })
    .then(response => response.json())
    .then(data => {
      globalRoles = data;
      
      // Populate the first row's select
      // We look for any select with the name "Role"
      const firstSelect = document.querySelector('select[name="Role"]');
      if (firstSelect) {
        populateOptions(firstSelect);
      }
    })
    .catch(error => console.error('Error fetching roles:', error));
  }

  // 3. Helper function to fill a select element
  function populateOptions(selectElement) {
    // Keep the "Select Role" placeholder, remove others
    selectElement.innerHTML = '<option value="">Select Role</option>';
    
    globalRoles.forEach(role => {
      const option = document.createElement('option');
      option.value = role.id;
      option.textContent = role.name;
      selectElement.appendChild(option);
    });
  }

  // 4. Function to add extra rows
  function addExtraRole() {
    const tableBody = document.getElementById('Roles-Table-Body');
    const rowCount = tableBody.rows.length + 1;
    const newRow = tableBody.insertRow();
    
    newRow.innerHTML = `
        <td>${rowCount}</td>
        <td>
            <select name="Role" class="w-100 select-search">
                <option value="">Select Role</option>
            </select>
        </td>
        <td>
            <button type="button" class="btn btn-danger" onclick="removeTR(this)">
                <img src="/static/icons/trash.svg" alt="remove" class="icon" width="20"/>
            </button>
        </td>
    `;

    // Fill the newly created select
    const newSelect = newRow.querySelector('select');
    populateOptions(newSelect);
    
    updateCount();
  }

  // 5. Function to remove rows
  function removeTR(button) {
    const row = button.closest('tr');
    row.remove();
    updateCount();
    reIndexRows();
  }

  function updateCount() {
    const tableBody = document.getElementById('Roles-Table-Body');
    const input = document.getElementById('rolesCountInput');
    if (input) input.value = tableBody.rows.length;
  }

  function reIndexRows() {
    const rows = document.querySelectorAll('#Roles-Table-Body tr');
    rows.forEach((row, index) => {
      row.cells[0].innerText = index + 1;
    });
  }
</script>
{{end}}
