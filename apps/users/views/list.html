{{define "content"}}

<h1>Users</h1>

<!-- 🔍 Search Bar -->
<form method="GET" style="margin-bottom: 15px;">
    <input type="text" name="q" value="{{.Query}}" placeholder="Search..." />
    <button type="submit" class="btn-secondary">Search</button>
</form>

<table>
    <thead>
        <tr>
            <th>
                <a href="?sort=id&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    ID
                </a>
            </th>
            <th>
                <a href="?sort=username&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    Name
                </a>
            </th>
            <th>Email</th>
            <th>Roles</th>
            <th>Active</th>
        </tr>
    </thead>

    <tbody>
        {{range .Users}}
        <tr>
            <td>{{.ID}}</td>
            <td>{{.Username}}</td>
            <td>{{.Email}}</td>
            <td>{{.Role}}</td>
            <td>{{.Active}}</td>
        </tr>
        {{end}}
    </tbody>
</table>

{{end}}
