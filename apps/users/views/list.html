{{define "content"}}

<h1>Users</h1>

<div class="toolbar">
<!-- 🔍 Search Bar -->
<form method="GET" style="margin-bottom: 15px;">
    <input type="text" name="q" value="{{.Query}}" placeholder="Search..." />
    <button type="submit" class="btn btn-secondary">Search</button>
</form>

<form method="GET" style="margin-bottom: 15px;">
    <label for="status">Status:</label>
    <select name="status" id="status" onchange="this.form.submit()">
        <option value="">All</option>
        <option value="active" {{if eq .Status "active"}}selected{{end}}>Active</option>
        <option value="inactive" {{if eq .Status "inactive"}}selected{{end}}>Inactive</option>
    </select>
</form>


<form method="GET" style="margin-bottom: 15px;" action="/users/create">
   <button type="submit" class="btn btn-primery">
     <img src="/static/icons/userPlus.svg" alt="Add New User +"  class="icon" width="20"/>
   </button>
</form>


</div><!--toolbar-->


<table>
    <thead>
        <tr>
            <th>
                <a href="?sort=id&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    ID
                </a>
            </th>
            <th>
                <a href="?sort=username&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    Name
                </a>
            </th>
            <th>Email</th>
            <th>Online</th>
            <th>Active</th>
        </tr>
    </thead>

    <tbody>
        {{range .Users}}
        <tr>
            <td>{{.ID}}</td>
            <td>{{.Username}}</td>
            <td>{{.Email}}</td>

            <td>
                <!-- Online Status Indicator  add .online or .offline-->

                <div class="status-indicator" id="user-{{.ID}}"></div>
            </td>

            <td>{{.Active}}</td>
        </tr>
        {{end}}
    </tbody>
</table>



<script>
    // websocket-client.js
document.addEventListener("DOMContentLoaded", () => {
    console.log("Initializing WebSocket connection...");



class ZTERPWebSocket {
    constructor() {
        this.socket = null;
        this.heartbeatInterval = null;
        this.reconnectDelay = 3000; // 3 seconds
        this.connect();
    }

    connect() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${protocol}://${window.location.host}/ws`;

        this.socket = new WebSocket(wsUrl);

        this.socket.onopen = () => {
            console.log("WebSocket connected");
            this.startHeartbeat();

                // Fetch initial online users status
                this.fetchOnlineUsers();
        };

        this.socket.onmessage = (event) => {
            console.log("WS Message:", event.data);

            // Example: handle online users update
            if (event.data === "ONLINE_USERS_UPDATE") {
                this.fetchOnlineUsers();
            }
        };

        this.socket.onclose = () => {
            console.warn("WebSocket closed, reconnecting...");
            this.stopHeartbeat();
            setTimeout(() => this.connect(), this.reconnectDelay);
        };

        this.socket.onerror = (err) => {
            console.error("WebSocket error:", err);
            this.stopHeartbeat();
            this.socket.close();
        };
    }

    startHeartbeat() {
        this.heartbeatInterval = setInterval(() => {
            if (this.socket.readyState === WebSocket.OPEN) {

                 this.fetchOnlineUsers();

               fetch("/api/heartbeat", {
                    method: "POST",
                    credentials: "include" // sends cookies
                }).catch(err => console.error("Heartbeat error:", err));  

                this.socket.send(JSON.stringify({ type: "heartbeat" }));
            }
        }, 5000); // every 5 seconds
    }

    stopHeartbeat() {
        if (this.heartbeatInterval) {


             fetch("/api/stopHeartbeat", {
                    method: "POST",
                    credentials: "include" // sends cookies
                }).catch(err => console.error("Heartbeat error:", err));  


            clearInterval(this.heartbeatInterval);
            this.heartbeatInterval = null;
        }
    }

    fetchOnlineUsers() {
        fetch("/api/online-users", {
            method: "GET",
            credentials: "include" // sends cookies
        })
        .then(res => res.json())
        .then(data => {
            console.log("Online users:", data);
            // update UI here

            //Set ALL users to offline first
            document.querySelectorAll(".status-indicator").forEach(indicator => {
                    indicator.classList.add("offline");
                    indicator.classList.remove("online");
                });




                //Set only online users to green
                data.forEach(userId => {
                    const indicator = document.getElementById("user-" + userId);
                    if (indicator) {
                        indicator.classList.add("online");
                        indicator.classList.remove("offline");
                    }
                });
        });
    } //close fetchOnlineUsers



} //close class

window.ZTERPWebSocket = new ZTERPWebSocket();

});

</script>

{{end}}
