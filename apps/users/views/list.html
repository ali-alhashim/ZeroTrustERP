{{define "content"}}

<h1>Users</h1>

<div class="toolbar">
<!-- 🔍 Search Bar -->
<form method="GET" style="margin-bottom: 15px;">
    <input type="text" name="q" value="{{.Query}}" placeholder="Search..." />
    <button type="submit" class="btn btn-secondary">Search</button>
</form>

<form method="GET" style="margin-bottom: 15px;">
    <label for="status">Status:</label>
    <select name="status" id="status" onchange="this.form.submit()">
        <option value="">All</option>
        <option value="active" {{if eq .Status "active"}}selected{{end}}>Active</option>
        <option value="inactive" {{if eq .Status "inactive"}}selected{{end}}>Inactive</option>
    </select>
</form>


<form method="GET" style="margin-bottom: 15px;" action="/users/create">
   <button type="submit" class="btn btn-primery">
     <img src="/static/icons/userPlus.svg" alt="Add New User +"  class="icon" width="20"/>
   </button>
</form>


</div><!--toolbar-->


<table>
    <thead>
        <tr>
            <th>
                <a href="?sort=id&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    ID
                </a>
            </th>
            <th>
                <a href="?sort=username&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    Name
                </a>
            </th>
            <th>Email</th>
            <th>Online</th>
            <th>Active</th>
        </tr>
    </thead>

    <tbody>
        {{range .Users}}
        <tr>
            <td>{{.ID}}</td>
            <td>{{.Username}}</td>
            <td>{{.Email}}</td>

            <td>
                <!-- Online Status Indicator  add .online or .offline-->

                <div class="status-indicator" id="user-{{.ID}}"></div>
            </td>

            <td>{{.Active}}</td>
        </tr>
        {{end}}
    </tbody>
</table>



<script>
document.addEventListener("DOMContentLoaded", () => {


        // ✅ Update presence UI (no fetch / no API)
        function updateOnlineStatus(onlineUsers) {

            console.log("✅ Updating online:", onlineUsers);

            // Mark all as offline first
            document.querySelectorAll(".status-indicator").forEach(indicator => {
                indicator.classList.add("offline");
                indicator.classList.remove("online");
            });

            // Mark online users
            onlineUsers.forEach(userId => {
                const indicator = document.getElementById("user-" + userId);
                if (indicator) {
                    indicator.classList.add("online");
                    indicator.classList.remove("offline");
                }
            });
        }
});


updateOnlineStatus();

  
</script>
{{end}}
