{{define "content"}}

<h1>Users</h1>

<div class="toolbar">
<!-- 🔍 Search Bar -->
<form method="GET" style="margin-bottom: 15px;">
    <input type="text" name="q" value="{{.Query}}" placeholder="Search..." />
    <button type="submit" class="btn btn-secondary">Search</button>
</form>

<form method="GET" style="margin-bottom: 15px;">
    <label for="status">Status:</label>
    <select name="status" id="status" onchange="this.form.submit()">
        <option value="">All</option>
        <option value="active" {{if eq .Status "active"}}selected{{end}}>Active</option>
        <option value="inactive" {{if eq .Status "inactive"}}selected{{end}}>Inactive</option>
    </select>
</form>


<form method="GET" style="margin-bottom: 15px;" action="/users/create">
   <button type="submit" class="btn btn-primery">
     <img src="/static/icons/userPlus.svg" alt="Add New User +"  class="icon" width="20"/>
   </button>
</form>


</div><!--toolbar-->


<table>
    <thead>
        <tr>
            <th>
                <a href="?sort=id&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    ID
                </a>
            </th>
            <th>
                <a href="?sort=username&order={{if eq .Order "asc"}}desc{{else}}asc{{end}}">
                    Name
                </a>
            </th>
            <th>Email</th>
            <th>Online</th>
            <th>Active</th>
            <th>Last Login</th>
            <th>Revoke Session</th>
        </tr>
    </thead>

    <tbody>
        {{range .Users}}
        <tr>
            <td>
                <a class="btn btn-primary" href="/users/details/{{.ID}}">
                {{.ID}}
                </a>
            </td>

            <td>{{.Username}}</td>
            <td>{{.Email}}</td>

            <td>
                <!-- Online Status Indicator  add .online or .offline-->

                <div class="status-indicator" id="user-{{.ID}}"></div>
            </td>

            <td>{{.Active}}</td>

           <td>
            {{if .LastLogin}}
                {{.LastLogin.Format "2006-01-02 15:04:05"}}
            {{else}}
                Never
            {{end}}
            </td>
            <td>
                <button onclick="RevokeSession(this)" data-userid="{{.ID}}">
                    <img src="/static/icons/power.svg" class="icon" width="20">
                </button>
            </td>
        </tr>
        {{end}}
    </tbody>
</table>



<script>
document.addEventListener("DOMContentLoaded", () => {

    function applyPresence(onlineUsers) {
        console.log("✅ Updating online users:", onlineUsers);

        // First mark all as offline
        document.querySelectorAll(".status-indicator").forEach(elem => {
            elem.classList.remove("online");
            elem.classList.add("offline");
        });

        // Then mark online ones
        onlineUsers.forEach(id => {
            const elem = document.getElementById("user-" + id);
            if (elem) {
                elem.classList.add("online");
                elem.classList.remove("offline");
            }
        });
    }

    function fetchInitialPresence() {
        fetch("/api/online-users")
            .then(res => {
                if (!res.ok) throw new Error("HTTP " + res.status);
                return res.json();
            })
            .then(onlineUsers => {
                applyPresence(onlineUsers);
            })
            .catch(err => console.warn("Could not fetch initial presence:", err));
    }

    function waitForSocket() {
        if (window.ZTERPWebSocket) {
            console.log("✅ ZTERPWebSocket ready — attaching presence listener");

            // Hook into real-time updates
            window.ZTERPWebSocket.onPresenceUpdate = applyPresence;

            // ✅ Fetch current state immediately — don't wait for next WS event
            fetchInitialPresence();

        } else {
            setTimeout(waitForSocket, 150);
        }
    }

    waitForSocket();




  
});


  function RevokeSession(button)
    {
        const userID = button.dataset.userid;
        if (!confirm(`Are you sure you want to revoke user ${userID} session?`)) return;

        //send post request to /users/RevokeSession/userID
        console.log(`RevokeSession for userID ${userID}`);

        fetch(`/users/RevokeSession/${userID}`, {
        method: 'POST',
        credentials: 'include',
        headers: {
            'Content-Type': 'application/json'
            // Add CSRF tokens here if your Go backend requires them
        }
    })
    .then(response => {
        if (response.status==200) {
            alert("Session revoked successfully.");
            location.reload(); // Refresh to update the UI
        } else {
            alert(`Failed to revoke session. ${response.status}`);
        }
    })
    .catch(err => console.error("Error:", err));

    }


   
</script>


{{end}}
